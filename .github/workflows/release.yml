name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      ASSET_FILE: ""
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: nrmrs.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: nrmrs
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: nrmrs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Set release metadata
        shell: pwsh
        run: |
          "VERSION=${env:GITHUB_REF_NAME}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASSET_BASENAME=nrmrs-$($env:GITHUB_REF_NAME)-${{ matrix.target }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if ("${{ matrix.bin_name }}" -eq "nrmrs.exe") {
            $asset = "$env:ASSET_BASENAME.exe"
          } else {
            $asset = "$env:ASSET_BASENAME"
          }
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" $asset
          "ASSET_FILE=$asset" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET_FILE }}
