name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: nrmrs.exe
            archive_ext: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: nrmrs
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: nrmrs
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Set release metadata
        shell: pwsh
        run: |
          "VERSION=${env:GITHUB_REF_NAME}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASSET_BASENAME=nrmrs-$($env:GITHUB_REF_NAME)-${{ matrix.target }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package (zip for Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path $env:ASSET_BASENAME -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "$env:ASSET_BASENAME/${{ matrix.bin_name }}"
          Compress-Archive -Path "$env:ASSET_BASENAME/*" -DestinationPath "$env:ASSET_BASENAME.zip" -Force

      - name: Package (tar.gz for macOS/Linux)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ASSET_BASENAME}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "${ASSET_BASENAME}/${{ matrix.bin_name }}"
          tar -czf "${ASSET_BASENAME}.tar.gz" "${ASSET_BASENAME}"

      - name: Generate SHA256 file
        shell: pwsh
        run: |
          if ("${{ matrix.archive_ext }}" -eq "zip") {
            $asset = "$env:ASSET_BASENAME.zip"
          } else {
            $asset = "$env:ASSET_BASENAME.tar.gz"
          }
          $fileName = Split-Path -Leaf $asset
          $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLower()
          Set-Content -Path "$asset.sha256" -Value "$hash  $fileName" -NoNewline
          "ASSET_FILE=$asset" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET_FILE }}
            ${{ env.ASSET_FILE }}.sha256
